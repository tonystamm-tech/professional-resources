<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="100%" height="100%" style="background-color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Background Pattern representing mathematical precision and structure -->
    <pattern id="gridPattern" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#F1F5F9" stroke-width="1.5"/>
    </pattern>

    <!-- Subtle Drop Shadows -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <filter id="accentGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#D97706" flood-opacity="0.25"/>
    </filter>

    <!-- Linear Gradients for depth -->
    <linearGradient id="navyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>

    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- ================= BACKGROUND SECTIONS ================= -->
  <!-- Main White Background -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  
  <!-- Light Gray Section (Lower Architecture Anchor) -->
  <path d="M 0 360 L 900 360 L 900 480 L 0 480 Z" fill="#F8FAFC"/>
  <line x1="0" y1="360" x2="900" y2="360" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Subtle Grid Texture in Hero Area -->
  <rect x="0" y="0" width="900" height="360" fill="url(#gridPattern)"/>

  <!-- ================= ICON / EMBLEM ================= -->
  <!-- Concept: Architectural 'S' built from mathematical building blocks (Tessellation/Capacity) -->
  <g transform="translate(130, 80)" filter="url(#softShadow)">
    
    <!-- Base Layer: Foundation Block (Teal - Building Capacity) -->
    <path d="M 10 130 L 70 95 L 130 130 L 70 165 Z" fill="url(#tealGradient)"/>
    <path d="M 10 130 L 70 165 L 70 185 L 10 150 Z" fill="#0F766E" opacity="0.9"/>
    <path d="M 70 165 L 130 130 L 130 150 L 70 185 Z" fill="#115E59" opacity="0.9"/>

    <!-- Middle Layer: Connecting Block (Navy - Structural Leadership) -->
    <path d="M 40 80 L 100 45 L 160 80 L 100 115 Z" fill="url(#navyGradient)"/>
    <path d="M 40 80 L 100 115 L 100 135 L 40 100 Z" fill="#0F172A"/>
    <path d="M 100 115 L 160 80 L 160 100 L 100 135 Z" fill="#020617"/>

    <!-- Top Layer: Spark Block (Gold - Inspiring Thinking) -->
    <g filter="url(#accentGlow)">
      <path d="M 70 30 L 130 -5 L 190 30 L 130 65 Z" fill="url(#goldGradient)"/>
      <path d="M 70 30 L 130 65 L 130 80 L 70 45 Z" fill="#D97706"/>
      <path d="M 130 65 L 190 30 L 190 45 L 130 80 Z" fill="#B45309"/>
    </g>

    <!-- Mathematical Precision Lines & Intersecting Nodes -->
    <line x1="70" y1="95" x2="130" y2="65" stroke="#F59E0B" stroke-width="2" stroke-dasharray="3 3"/>
    <circle cx="130" cy="65" r="4" fill="#FFFFFF"/>
    <circle cx="70" cy="95" r="3" fill="#0D9488"/>
    <circle cx="100" cy="45" r="3" fill="#1E293B"/>

    <!-- Subtle Golden Spark/Delta (Mathematical Growth Symbol) -->
    <path d="M 175 0 L 182 12 L 195 15 L 183 22 L 185 35 L 175 26 L 165 35 L 167 22 L 155 15 L 168 12 Z" fill="#F59E0B" opacity="0.85" transform="scale(0.5) translate(180, -20)"/>
  </g>

  <!-- ================= TYPOGRAPHY ================= -->
  
  <!-- Primary Brand Name -->
  <g transform="translate(360, 145)">
    <!-- STAMM (Navy Header Color, Bold, Solid Foundation) -->
    <text x="0" y="0" font-size="52" font-weight="900" fill="#0F172A" letter-spacing="3" text-anchor="start">
      STAMM
    </text>
    
    <!-- LEARNING STUDIO (Teal Button Color + Gold Accent) -->
    <text x="0" y="42" font-size="24" font-weight="600" fill="#0D9488" letter-spacing="6" text-anchor="start">
      LEARNING <tspan fill="#D97706" font-weight="800">STUDIO</tspan>
    </text>

    <!-- Decorative Divider Line with Mathematical Accent -->
    <rect x="0" y="58" width="440" height="3" fill="#E2E8F0" rx="1.5"/>
    <rect x="0" y="58" width="90" height="3" fill="#0D9488" rx="1.5"/>
    <circle cx="90" cy="59.5" r="4" fill="#F59E0B"/>
  </g>

  <!-- ================= TAGLINE WITH BALANCED & LOADING PILL ================= -->
  <g transform="translate(450, 415)">
    <!-- 1. Centered Outer Pill / Capsule Frame -->
    <rect x="-375" y="-24" width="750" height="48" rx="24" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" filter="url(#softShadow)"/>

    <!-- 2. Animated Loading Progress Bar Fill inside the Pill -->
    <rect x="-371" y="-20" width="742" height="40" rx="20" fill="url(#tealGradient)" opacity="0.12">
      <animate attributeName="width" values="40; 742; 742; 40" keyTimes="0; 0.7; 0.9; 1" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- 3. Animated Loading Pulse Ring around the Pill border -->
    <rect x="-375" y="-24" width="750" height="48" rx="24" fill="none" stroke="#0D9488" stroke-width="2" stroke-dasharray="80 670" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- 4. Perfectly Balanced Tagline Text (Symmetrically Aligned) -->
    <!-- Left Phrase: Building Teacher Capacity -->
    <text x="-190" y="5" font-size="14" font-weight="700" fill="#0F172A" letter-spacing="1.2" text-anchor="middle">
      BUILDING TEACHER CAPACITY
    </text>

    <!-- Center Icon: Rotating Math Spark / Loading Indicator -->
    <g transform="translate(0, -1)">
      <circle cx="0" cy="0" r="12" fill="#FEF3C7"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2s" repeatCount="indefinite"/>
        <path d="M 0 -7 L 2 -2 L 7 0 L 2 2 L 0 7 L -2 2 L -7 0 L -2 -2 Z" fill="#D97706"/>
      </g>
    </g>

    <!-- Right Phrase: Inspiring Mathematical Thinking -->
    <text x="190" y="5" font-size="14" font-weight="700" fill="#0D9488" letter-spacing="1.2" text-anchor="middle">
      INSPIRING MATHEMATICAL THINKING
    </text>

    <!-- 5. Pulsing Glowing Indicator Dot at the end (Loading Activity Signal) -->
    <circle cx="345" cy="0" r="4" fill="#10B981">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3.5;5;3.5" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

</svg>
